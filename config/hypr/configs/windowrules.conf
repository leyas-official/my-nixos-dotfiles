# APPLIACTIONS BLUR
windowrule {
  name = windowrule-1
  no_blur = on
  opacity = 1.0
  float = on
  size = 900 506
  match:tag = multimedia_video*
}

windowrule {
  name = windowrule-2
  opacity = 0.8
  float = on
  match:tag = settings*
}

windowrule {
  name = windowrule-3
  opacity = 0.8
  match:class = ^(org.gnome.Nautilus)$
}

windowrule {
  name = windowrule-4
  opacity = 0.9
  match:class = ^(gedit|org.gnome.TextEditor|mousepad)$
}

windowrule {
  name = windowrule-5
  opacity = 0.9
  float = on
  size = (monitor_w*0.5) (monitor_h*0.6)
  match:class = ^(org.pulseaudio.pavucontrol)$
}

windowrule {
  name = windowrule-6
  opacity = 1.0
  match:class = tile^(kitty)$
}

windowrule {
  name = windowrule-7
  opacity = 0.9 override 0.7 override 1 override
  match:class = ^(discord|vesktop|org.telegram.desktop)$
}

windowrule {
  name = windowrule-8
  opacity = 0.9 override 0.6 override 1 override
  match:class = ^(Spotify)$
}

windowrule {
  name = windowrule-9
  opacity = 0.9 override 0.7 override 1 override
  match:class = ^(zen)$
}

#windowrule = opacity 0.8 override 0.6 override 1 override, tag:viewer*

# LAYER RULES
layerrule {
  name = layerrule-1
  blur = on
  ignore_alpha = 0.5
  dim_around = on
  animation = popin 100%
  match:namespace = rofi
}

layerrule {
  name = layerrule-2
  blur = on
  ignore_alpha = 0
  match:namespace = notifications
}

layerrule {
  name = layerrule-3
  blur = on
  ignore_alpha = 0.5
  match:namespace = waybar
}

#layerrule = ignorezero, waybar
layerrule {
  name = layerrule-4
  ignore_alpha = 0.5
  match:namespace = tag:notif*
}

layerrule {
  name = layerrule-5
  blur = on
  match:namespace = logout_dialog
}


# SWAYNC BLUR & XRAY
layerrule {
  name = layerrule-6
  blur = on
  ignore_alpha = 0.5
  xray = 0
  match:namespace = swaync-control-center
}

layerrule {
  name = layerrule-7
  blur = on
  ignore_alpha = 0.5
  xray = 0
  match:namespace = swaync-notification-window
}


#FLOAT
windowrule {
  name = windowrule-10
  float = on
  match:tag = viewer*
}


# Ignore maximize requests from apps. You'll probably like this.
windowrule {
  name = windowrule-11
  suppress_event = maximize
  match:class = .*
}


# Fix some dragging issues with XWayland
windowrule {
  name = windowrule-12
  no_focus = on
  match:class = ^$
  match:title = ^$
  match:xwayland = 1
  match:float = 1
  match:fullscreen = 0
  match:pin = 0
}


# POP UPS AND DIALOGUES
windowrule {
  name = windowrule-13
  float = on
  size = (monitor_w*0.5) (monitor_h*0.6)
  center = on
  match:title = ^(Save As|Save a File|Pick Files)$
}


windowrule {
  name = windowrule-14
  float = on
  size = (monitor_w*0.7) (monitor_h*0.6)
  match:initial_title = (Open Files)
}
